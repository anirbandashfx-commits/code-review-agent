# ─────────────────────────────────────────────
# AgentAudit — Code Review Agent Configuration
# ─────────────────────────────────────────────

spring.application.name=code-review-agent
server.port=8080

# ── LiteLLM Gateway ──────────────────────────
# Point this at your local LiteLLM proxy (recommended)
# or directly at OpenRouter as a fallback.
litellm.base-url=https://openrouter.ai/api/v1
litellm.api-key=<your-openrouter-api-key>


# Primary model (routed through LiteLLM → OpenRouter)
litellm.model.primary=openrouter/owl-alpha
# Fallback model — used when primary fails or is rate-limited
# FLAW #3: fallback is commented out — no failover configured
# litellm.model.fallback=openrouter/meta-llama/llama-3.1-8b-instruct:free

# ── OpenRouter (direct, bypass LiteLLM) ──────
# Used as a direct fallback if LiteLLM proxy is down
openrouter.base-url=https://openrouter.ai/api/v1
openrouter.api-key=<your-openrouter-api-key>

# ── Valkey / Redis Cache ──────────────────────
spring.data.redis.host=${VALKEY_HOST:localhost}
spring.data.redis.port=${VALKEY_PORT:6379}
spring.data.redis.password=${VALKEY_PASSWORD:}
# Cache TTL for LLM responses (seconds)
# FLAW #4: TTL is set to 0 — caching is effectively disabled
app.cache.ttl-seconds=0

# ── Agent Graph Settings ──────────────────────
# Max iterations before the agent is forced to stop
# FLAW #2: this is set dangerously high — agents can loop for 50 steps
agent.max-iterations=50
agent.timeout-seconds=120

# ── Actuator (observability) ──────────────────
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always

# ── Logging ──────────────────────────────────
logging.level.com.agentaudit=INFO
# FLAW #5: tool call inputs/outputs are not logged at DEBUG level
# logging.level.com.agentaudit.agent=DEBUG
